<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HJAgenticAI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <header class="hero">
          <div class="hero-topline">
            <span class="hero-badge">HJAgenticAI</span>
            <span class="hero-pilot">Grok-inspired AI with crisp local performance</span>
          </div>
          <h1>Conversational intelligence, refined.</h1>
          <p class="subtitle">
            A sleek local agent interface with polished responses, smart tool integration, and a modern conversational flow.
          </p>
          <div class="hero-hint">
            Try: "My name is Olivia", "Convert 10 km to miles", or "What is my name?"
          </div>
        </header>

        <div id="chatBox" class="chat-box" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="messageInput"
            type="text"
            placeholder="Type your message..."
            autocomplete="off"
            required
          />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
